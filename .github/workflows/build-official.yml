name: Build OpenBOR aarch64 (Official)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag (e.g. master, v7533, v7530)'
        required: true
        default: 'v7533'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: ${{ runner.os }}-ccache-openbor-official-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-openbor-official-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: openbor-builder:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Rotate buildx cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Prepare directories
        run: mkdir -p output ccache

      - name: Run build in Docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/output:/output" \
            -v "${{ github.workspace }}/ccache:/ccache" \
            -e OUTPUT_DIR=/output \
            -e CCACHE_DIR=/ccache \
            -e OPENBOR_REPO=https://github.com/DCurrent/openbor.git \
            -e OPENBOR_BRANCH=${{ github.event.inputs.ref }} \
            openbor-builder:latest /build_official.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenBOR-aarch64-official-${{ github.event.inputs.ref }}
          path: output/
          if-no-files-found: error
          retention-days: 30
